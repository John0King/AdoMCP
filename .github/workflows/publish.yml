name: Publish to NuGet

# Trigger automatically on a version tag push (e.g. v1.2.3),
# or manually via the GitHub Actions UI (with optional review environment).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.2.3). Must match the tag."
        required: true

# Require an explicit approval before publishing when triggered manually.
# Create a GitHub environment named "nuget" and add required reviewers there.
jobs:
  publish:
    name: Pack & Push to NuGet.org
    runs-on: ubuntu-latest
    environment: nuget        # optional: configure reviewers in the "nuget" environment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Derive the version from the tag (strip leading "v") or the manual input.
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: >
          dotnet pack
          --no-build
          --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
