name: Publish to NuGet and MCP Registry

# Trigger automatically on a version tag push (e.g. v1.2.3),
# or manually via the GitHub Actions UI (with optional review environment).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.2.3). Must match the tag."
        required: true

# Require an explicit approval before publishing when triggered manually.
# Create a GitHub environment named "nuget" and add required reviewers there.
jobs:
  publish:
    name: Pack, Push to NuGet.org & Publish MCP Metadata
    runs-on: ubuntu-latest
    environment: nuget        # optional: configure reviewers in the "nuget" environment
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Derive the version from the tag (strip leading "v") or the manual input.
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: >
          dotnet pack
          --no-build
          --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Sync server.json version
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          version = "${{ steps.version.outputs.VERSION }}"
          path = Path("server.json")
          data = json.loads(path.read_text())
          data["version"] = version
          for package in data.get("packages", []):
              package["version"] = version
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
